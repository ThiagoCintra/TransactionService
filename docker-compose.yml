version: '3.8'

services:
  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transaction-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JWT_SECRET=bXlTdXBlclNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMzQ1Njc4OTA=
      - LOGIN_SERVICE_URL=http://login-service-mock:8081
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/transactions
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOGIN_SERVICE_FAIL_FAST=true
      - WAIT_HOSTS=login-service-mock:8080,localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
      login-service-mock:
        condition: service_started
    networks:
      - transaction-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  localstack:
    image: localstack/localstack:3.0
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - transaction-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  login-service-mock:
    image: wiremock/wiremock:3.3.1
    container_name: login-service-mock
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: ["--port", "8080", "--root-dir", "/home/wiremock"]
    networks:
      - transaction-network

networks:
  transaction-network:
    driver: bridge
