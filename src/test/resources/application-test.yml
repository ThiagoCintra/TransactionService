spring:
  application:
    name: transaction-service-test

login-service:
  base-url: http://localhost:${wiremock.server.port:8099}
  timeout-millis: 5000

aws:
  sqs:
    queue-url: http://localhost:4566/000000000000/transactions
    region: us-east-1
    endpoint: ""
  access-key-id: test
  secret-access-key: test

feature-flags:
  login-service-fail-fast: true

resilience4j:
  circuitbreaker:
    instances:
      loginService:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
  retry:
    instances:
      loginService:
        max-attempts: 1
        wait-duration: 100ms
