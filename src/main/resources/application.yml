spring:
  application:
    name: transaction-service

server:
  port: 8080

login-service:
  base-url: ${LOGIN_SERVICE_URL:http://login-service:8081}
  timeout-millis: ${LOGIN_SERVICE_TIMEOUT_MILLIS:2000}

aws:
  endpoint: ${AWS_ENDPOINT:http://localstack:4566}
  region: ${AWS_REGION:us-east-1}
  sqs:
    queue-url: ${SQS_QUEUE_URL}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
  access-key-id: ${AWS_ACCESS_KEY_ID:test}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:test}

feature-flags:
  login-service-fail-fast: ${LOGIN_SERVICE_FAIL_FAST:true}

resilience4j:
  circuitbreaker:
    instances:
      loginService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        event-consumer-buffer-size: 10
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - com.transactionservice.exception.LoginServiceUnavailableException
  retry:
    instances:
      loginService:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
        ignore-exceptions:
          - com.transactionservice.exception.BusinessException
          - com.transactionservice.exception.UnauthorizedException
      sqsPublish:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - software.amazon.awssdk.core.exception.SdkClientException
        ignore-exceptions:
          - com.transactionservice.exception.BusinessException

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,retries
  endpoint:
    health:
      show-details: when_authorized
  health:
    circuitbreakers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.transactionservice: INFO
    org.springframework.security: WARN
